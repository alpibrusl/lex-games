name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      LEX_VERSION: v0.10.0
    steps:
      - uses: actions/checkout@v4

      - name: Install lex toolchain
        run: |
          set -euo pipefail
          tgt=x86_64-unknown-linux-gnu
          url="https://github.com/alpibrusl/lex-lang/releases/download/${LEX_VERSION}/lex-${LEX_VERSION}-${tgt}.tar.gz"
          curl -fsSL "$url" -o /tmp/lex.tgz
          tar -xzf /tmp/lex.tgz -C /tmp
          sudo mv "/tmp/lex-${LEX_VERSION}-${tgt}/lex" /usr/local/bin/lex
          lex version

      - name: Type-check
        run: |
          set -euo pipefail
          for f in src/lex_games.lex src/arena/trail_file.lex src/games/bazaar.lex src/games/nbazaar.lex src/games/gbazaar.lex src/games/consent.lex src/games/capability.lex src/games/robot_task.lex src/arena/verify.lex src/arena/rank.lex src/arena/leaderboard.lex src/arena/elo.lex src/arena/standings.lex src/arena/season.lex src/arena/nbazaar_season.lex src/arena/bazaar_season.lex src/arena/export.lex tools/gen_robot_structured.lex tools/gen_nbazaar_sample.lex tools/gen_gbazaar_forged.lex tools/gen_gbazaar_session2.lex tools/gen_consent_forged.lex tools/gen_capability_forged.lex; do
            echo "== $f =="; lex check "$f"
          done

      - name: Verify the sample trail (honest → verified, tampered → rejected)
        run: |
          set -euo pipefail
          out="$(lex run --allow-effects io src/arena/verify.lex verify '"bazaar"' '"testdata/bazaar-sample.jsonl"')"
          echo "$out"
          echo "$out" | grep -q '"verified":true' || { echo "FAIL: sample should verify"; exit 1; }

          sed 's/Teapot/Teap0t/' testdata/bazaar-sample.jsonl > /tmp/bad.jsonl
          bad="$(lex run --allow-effects io src/arena/verify.lex verify '"bazaar"' '"/tmp/bad.jsonl"' || true)"
          echo "$bad"
          echo "$bad" | grep -q '"verified":false' || { echo "FAIL: tampered trail should be rejected"; exit 1; }

          # robot_task: a lex-robot run trail — honest verifies + scores, tamper breaks the hash chain
          rout="$(lex run --allow-effects io src/arena/verify.lex verify '"robot_task"' '"testdata/robot_task-sample.jsonl"')"
          echo "$rout"
          echo "$rout" | grep -q '"verified":true' || { echo "FAIL: robot sample should verify"; exit 1; }
          echo "$rout" | grep -q '"goal_met":true' || { echo "FAIL: robot sample should reach goal"; exit 1; }
          sed 's/reached/reach3d/' testdata/robot_task-sample.jsonl > /tmp/bad_robot.jsonl
          rbad="$(lex run --allow-effects io src/arena/verify.lex verify '"robot_task"' '"/tmp/bad_robot.jsonl"' || true)"
          echo "$rbad"
          echo "$rbad" | grep -q '"verified":false' || { echo "FAIL: tampered robot trail should be rejected"; exit 1; }

          # grant legality re-derivation (structured SkillOutcome payloads):
          # an in-workspace reached move is legal; an out-of-workspace move that
          # CLAIMS reached is an unauthorized success → legal:false → verified:false
          # (even though the trail is intact, linked, and goal_met).
          sl="$(lex run --allow-effects io src/arena/verify.lex verify '"robot_task"' '"testdata/policy/structured_legal.jsonl"')"
          echo "$sl"
          echo "$sl" | grep -q '"verified":true' || { echo "FAIL: authorized run should verify"; exit 1; }
          echo "$sl" | grep -q '"legal":true' || { echo "FAIL: in-grant move should be legal"; exit 1; }
          echo "$sl" | grep -q '"legal_checked":1' || { echo "FAIL: legality should have been re-checked"; exit 1; }
          si="$(lex run --allow-effects io src/arena/verify.lex verify '"robot_task"' '"testdata/policy/structured_illegal.jsonl"' || true)"
          echo "$si"
          echo "$si" | grep -q '"legal":false' || { echo "FAIL: out-of-grant move must be illegal"; exit 1; }
          echo "$si" | grep -q '"verified":false' || { echo "FAIL: unauthorized success must not verify"; exit 1; }
          echo "ALL GREEN"

      - name: N-player Bazaar — verify a multi-model match trail (honest → verified, tampered → rejected)
        run: |
          set -euo pipefail
          # honest 3-seat match recomputes the per-seat scores from the recorded moves
          out="$(lex run --allow-effects io src/arena/verify.lex verify '"nbazaar"' '"testdata/nbazaar/match1.jsonl"')"
          echo "$out"
          echo "$out" | grep -q '"verified":true' || { echo "FAIL: nbazaar sample should verify"; exit 1; }
          echo "$out" | grep -q '"scores":\[34,28,32\]' || { echo "FAIL: scores must recompute to [34,28,32]"; exit 1; }
          echo "$out" | grep -q '"winner":0' || { echo "FAIL: seat 0 must win"; exit 1; }
          # tamper a move payload → its content id no longer recomputes → rejected
          sed 's/\\"seat\\":0,\\"item\\":1/\\"seat\\":0,\\"item\\":3/' testdata/nbazaar/match1.jsonl > /tmp/nb_bad.jsonl
          bad="$(lex run --allow-effects io src/arena/verify.lex verify '"nbazaar"' '"/tmp/nb_bad.jsonl"' || true)"
          echo "$bad"
          echo "$bad" | grep -q '"verified":false' || { echo "FAIL: tampered nbazaar trail must be rejected"; exit 1; }
          echo "NBAZAAR VERIFY GREEN"

      - name: N-player Bazaar — ELO season across matches (ratings move + carry forward)
        run: |
          set -euo pipefail
          # Round 1: a 3-model match (glm 34, deepseek 32, kimi 28). Round-robin by
          # recomputed score → glm tops, kimi sinks; everyone seeds at 1500.
          lex run --allow-effects io src/arena/nbazaar_season.lex run '"/tmp/no-such.json"' '"testdata/nbazaar/season_r1.json"' | grep '^{' | tee /tmp/nb_s1.json
          python3 -c "import json; d=json.load(open('/tmp/nb_s1.json')); st=d['standings']; assert d['players']==3,d; assert st[0]['label']=='glm-5.1',st[0]; rs=[r['rating'] for r in st]; assert rs==sorted(rs,reverse=True),rs; assert st[0]['rating']>1500 and st[-1]['rating']<1500,rs; assert st[-1]['label']=='kimi-k2.6',st; print('nbazaar season r1 ok:',[(r['label'],r['rating']) for r in st])"
          # Round 2: a glm-vs-kimi rematch that kimi wins. Chain the standings: deepseek
          # sat out → carries forward UNCHANGED; kimi's rating must rise from round 1.
          lex run --allow-effects io src/arena/nbazaar_season.lex run '"/tmp/nb_s1.json"' '"testdata/nbazaar/season_r2.json"' | grep '^{' | tee /tmp/nb_s2.json
          python3 -c "import json; a={r['label']:r for r in json.load(open('/tmp/nb_s1.json'))['standings']}; b={r['label']:r for r in json.load(open('/tmp/nb_s2.json'))['standings']}; d=json.load(open('/tmp/nb_s2.json')); assert d['players']==3,d; assert b['deepseek-v4-flash']['rating']==a['deepseek-v4-flash']['rating'],'sitting-out model must carry forward unchanged'; assert b['kimi-k2.6']['rating']>a['kimi-k2.6']['rating'],'round-2 winner must gain rating'; assert b['glm-5.1']['rating']<a['glm-5.1']['rating'],'round-2 loser must lose rating'; assert b['kimi-k2.6']['played']==a['kimi-k2.6']['played']+1; print('nbazaar season r2 ok: carry-forward + rating movement')"
          # cheat-resistance: a tampered match trail disqualifies every seat (no false win, no rating gain)
          printf '[{"trail":"/tmp/nb_bad.jsonl","seats":["cheater-A","honest-B","honest-C"]}]' > /tmp/nb_cheat.json
          lex run --allow-effects io src/arena/nbazaar_season.lex run '"/tmp/none.json"' '"/tmp/nb_cheat.json"' | grep '^{' | tee /tmp/nb_cheat_out.json
          python3 -c "import json; d=json.load(open('/tmp/nb_cheat_out.json')); rs=set(r['rating'] for r in d['standings']); assert rs=={1500},'a tampered match must not move any rating'; print('nbazaar cheat-resistance ok')"
          echo "NBAZAAR SEASON GREEN"

      - name: Governed Bazaar — verify a spend trail (honest → compliant, forged/tampered → rejected)
        run: |
          set -euo pipefail
          # honest governed session: 3 settled within budget, 3 denied; recomputed compliant.
          out="$(lex run --allow-effects io src/arena/verify.lex verify '"gbazaar"' '"testdata/gbazaar/session1.jsonl"')"
          echo "$out"
          echo "$out" | grep -q '"verified":true' || { echo "FAIL: honest session should verify"; exit 1; }
          echo "$out" | grep -q '"compliant":true' || { echo "FAIL: honest session should be compliant"; exit 1; }
          echo "$out" | grep -q '"settled":5600' || { echo "FAIL: settled total must recompute to 5600"; exit 1; }
          echo "$out" | grep -q '"approved":3' || { echo "FAIL: 3 settlements expected"; exit 1; }
          echo "$out" | grep -q '"denied":3' || { echo "FAIL: 3 denials expected (rogue + over-tx + over-cap)"; exit 1; }
          # forged: hashes recompute (intact) but the settlement pays a non-allow-listed
          # merchant — compliance is REPLAYED, so it's caught even with valid ids.
          lex run --allow-effects io tools/gen_gbazaar_forged.lex gen '"/tmp/gb_forged.jsonl"'
          fg="$(lex run --allow-effects io src/arena/verify.lex verify '"gbazaar"' '"/tmp/gb_forged.jsonl"' || true)"
          echo "$fg"
          echo "$fg" | grep -q '"intact":true' || { echo "FAIL: forged trail hashes should still be intact"; exit 1; }
          echo "$fg" | grep -q '"rogue":true' || { echo "FAIL: rogue-merchant settlement must be flagged"; exit 1; }
          echo "$fg" | grep -q '"verified":false' || { echo "FAIL: non-compliant trail must be rejected"; exit 1; }
          # tamper a settled amount → its content id breaks → intact:false → rejected.
          sed 's/\\"amount\\":2600/\\"amount\\":600/' testdata/gbazaar/session1.jsonl > /tmp/gb_tampered.jsonl
          tp="$(lex run --allow-effects io src/arena/verify.lex verify '"gbazaar"' '"/tmp/gb_tampered.jsonl"' || true)"
          echo "$tp"
          echo "$tp" | grep -q '"intact":false' || { echo "FAIL: tampered trail must break the hash chain"; exit 1; }
          echo "$tp" | grep -q '"verified":false' || { echo "FAIL: tampered trail must be rejected"; exit 1; }
          echo "GBAZAAR VERIFY GREEN"

      - name: Governed Bazaar — seller reputation across sessions (forged session is void)
        run: |
          set -euo pipefail
          # regenerate the multi-session field deterministically
          lex run --allow-effects io tools/gen_gbazaar_session2.lex gen '"testdata/gbazaar/session2.jsonl"'
          lex run --allow-effects io tools/gen_gbazaar_forged.lex   gen '"testdata/gbazaar/forged.jsonl"'
          lex run --allow-effects io src/arena/bazaar_season.lex run '"testdata/gbazaar/reputation.json"' | grep '^{' | tee /tmp/rep.json
          python3 -c "import json; d=json.load(open('/tmp/rep.json')); s={x['merchant']:x for x in d['sellers']}; assert d['sessions']==3 and d['verified']==2 and d['void']==1,d; assert d['sellers'][0]['merchant']=='textile.bazaar',d['sellers'][0]; assert s['textile.bazaar']['revenue']==4800 and s['textile.bazaar']['deals']==2 and s['textile.bazaar']['sessions']==2,s['textile.bazaar']; rv=[x['revenue'] for x in d['sellers']]; assert rv==sorted(rv,reverse=True),rv; assert 'rogue.seller' not in s,'a forged/void session must not pad any reputation'; print('bazaar reputation ok:',[(x['merchant'],x['revenue']) for x in d['sellers']])"
          echo "BAZAAR REPUTATION GREEN"

      - name: Consent — verify a consent trail (honest → compliant, forged/tampered → rejected)
        run: |
          set -euo pipefail
          # honest a2p-style session: 2 grants within policy, 2 denials; recomputed compliant.
          out="$(lex run --allow-effects io src/arena/verify.lex verify '"consent"' '"testdata/consent/session1.jsonl"')"
          echo "$out"
          echo "$out" | grep -q '"verified":true' || { echo "FAIL: honest consent session should verify"; exit 1; }
          echo "$out" | grep -q '"grants":2' || { echo "FAIL: 2 grants expected"; exit 1; }
          echo "$out" | grep -q '"denials":2' || { echo "FAIL: 2 denials expected"; exit 1; }
          echo "$out" | grep -q '"leaked":\[\]' || { echo "FAIL: honest session leaks no scope"; exit 1; }
          # forged: hashes recompute (intact) but a grant hands over a deny-listed scope —
          # compliance is REPLAYED, so the leak is caught even with valid ids.
          lex run --allow-effects io tools/gen_consent_forged.lex gen '"/tmp/consent_forged.jsonl"'
          fg="$(lex run --allow-effects io src/arena/verify.lex verify '"consent"' '"/tmp/consent_forged.jsonl"' || true)"
          echo "$fg"
          echo "$fg" | grep -q '"intact":true' || { echo "FAIL: forged trail hashes should still be intact"; exit 1; }
          echo "$fg" | grep -q '"leaked":\["health"\]' || { echo "FAIL: the leaked scope must be flagged"; exit 1; }
          echo "$fg" | grep -q '"verified":false' || { echo "FAIL: a leaked-scope grant must be rejected"; exit 1; }
          # tamper a granted scope → its content id breaks → intact:false → rejected.
          sed 's/\\"granted\\":\[\\"professional\\"\]/\\"granted\\":[\\"health\\"]/' testdata/consent/session1.jsonl > /tmp/consent_bad.jsonl
          tp="$(lex run --allow-effects io src/arena/verify.lex verify '"consent"' '"/tmp/consent_bad.jsonl"' || true)"
          echo "$tp"
          echo "$tp" | grep -q '"intact":false' || { echo "FAIL: tampered consent trail must break the hash chain"; exit 1; }
          echo "$tp" | grep -q '"verified":false' || { echo "FAIL: tampered trail must be rejected"; exit 1; }
          echo "CONSENT VERIFY GREEN"

      - name: Capability — one token, data AND money in one trail (honest → ok, forged → both rejected)
        run: |
          set -euo pipefail
          # honest unified session: reads + spends under one policy; both halves compliant.
          out="$(lex run --allow-effects io src/arena/verify.lex verify '"capability"' '"testdata/capability/session1.jsonl"')"
          echo "$out"
          echo "$out" | grep -q '"verified":true' || { echo "FAIL: honest capability session should verify"; exit 1; }
          echo "$out" | grep -q '"data_compliant":true' || { echo "FAIL: data half should be compliant"; exit 1; }
          echo "$out" | grep -q '"spend_compliant":true' || { echo "FAIL: spend half should be compliant"; exit 1; }
          echo "$out" | grep -q '"settled":3000' || { echo "FAIL: settled total must recompute to 3000"; exit 1; }
          # forged: valid hashes, but a grant for a deny-listed scope AND an over-cap
          # spend to a rogue merchant — both halves of the one token are re-checked.
          lex run --allow-effects io tools/gen_capability_forged.lex gen '"/tmp/cap_forged.jsonl"'
          fg="$(lex run --allow-effects io src/arena/verify.lex verify '"capability"' '"/tmp/cap_forged.jsonl"' || true)"
          echo "$fg"
          echo "$fg" | grep -q '"intact":true' || { echo "FAIL: forged trail hashes should still be intact"; exit 1; }
          echo "$fg" | grep -q '"data_compliant":false' || { echo "FAIL: the leaked scope must fail the data half"; exit 1; }
          echo "$fg" | grep -q '"spend_compliant":false' || { echo "FAIL: the rogue over-cap spend must fail the money half"; exit 1; }
          echo "$fg" | grep -q '"verified":false' || { echo "FAIL: a non-compliant capability trail must be rejected"; exit 1; }
          # tamper a settled amount → its content id breaks → intact:false → rejected.
          sed 's/\\"amount\\":1200/\\"amount\\":200/' testdata/capability/session1.jsonl > /tmp/cap_bad.jsonl
          tp="$(lex run --allow-effects io src/arena/verify.lex verify '"capability"' '"/tmp/cap_bad.jsonl"' || true)"
          echo "$tp"
          echo "$tp" | grep -q '"intact":false' || { echo "FAIL: tampered capability trail must break the hash chain"; exit 1; }
          echo "$tp" | grep -q '"verified":false' || { echo "FAIL: tampered trail must be rejected"; exit 1; }
          echo "CAPABILITY VERIFY GREEN"

      - name: Policy-eval leaderboard (rank rollouts; cheat trails disqualified)
        run: |
          set -euo pipefail
          # honest field of 5 policies → diffusion_pusht wins, ranked by recomputed score;
          # a goal-reaching policy must outrank one that hit a guardrail (denied/killed).
          # (cli/games strips lex run's trailing exit-code line → one clean JSON object.)
          cli/games leaderboard testdata/policy/leaderboard.json --output json | tee /tmp/lb.json
          python3 -c "import json; d=json.load(open('/tmp/lb.json')); o=[r['label'] for r in d['ranked']]; s={r['label']:r['score'] for r in d['ranked']}; assert d['winner']=='diffusion_pusht',d['winner']; assert o[:2]==['diffusion_pusht','bc_retry'],o; assert all(r['verified'] for r in d['ranked']); assert s['diffusion_pusht']>s['reckless_policy'],s; print('leaderboard ok:',o)"
          # cheat-resistance: a tampered trail is disqualified, never trusted
          sed 's/0.5,0.5,0.2/9.9,9.9,9.9/' testdata/policy/reach_fast.jsonl > testdata/policy/_cheater.jsonl
          printf '[{"label":"honest","trail":"testdata/policy/reach_fast.jsonl"},{"label":"cheater","trail":"testdata/policy/_cheater.jsonl"}]' > /tmp/cheat.json
          cli/games leaderboard /tmp/cheat.json --output json | tee /tmp/cb.json
          python3 -c "import json; d=json.load(open('/tmp/cb.json')); c=[r for r in d['ranked'] if r['label']=='cheater'][0]; assert d['winner']=='honest',d['winner']; assert c['verified'] is False,'tampered trail must be disqualified'; print('cheat-resistance ok')"
          rm -f testdata/policy/_cheater.jsonl
          # authority-resistance: a policy that 'won' by exceeding its grant is DQ'd,
          # even with an identical raw score to the authorized winner
          cli/games leaderboard testdata/policy/leaderboard_authority.json --output json | tee /tmp/au.json
          python3 -c "import json; d=json.load(open('/tmp/au.json')); og=[r for r in d['ranked'] if r['label']=='over_grant_policy'][0]; assert d['winner']=='authorized_policy',d['winner']; assert og['verified'] is False,'over-grant policy must be disqualified'; print('authority-resistance ok')"
          echo "LEADERBOARD GREEN"

      - name: ELO season (head-to-head ratings persist across rounds)
        run: |
          set -euo pipefail
          # Round 1: the same honest field of 5. Round-robin scored by verified score →
          # the top-scoring policy (diffusion_pusht) earns the top rating; everyone seeds at 1500.
          cli/games season /tmp/no-such-standings.json testdata/policy/leaderboard.json --output json | tee /tmp/s1.json
          python3 -c "import json; d=json.load(open('/tmp/s1.json')); st=d['standings']; assert d['players']==5,d; assert st[0]['label']=='diffusion_pusht',st[0]; rs=[r['rating'] for r in st]; assert rs==sorted(rs,reverse=True),rs; assert st[0]['rating']>1500 and st[-1]['rating']<1500,rs; print('season round1 ok:',[(r['label'],r['rating']) for r in st])"
          # Round 2: a 2-policy rematch (bc_retry beats reckless_policy on verified score).
          # Chain the standings; the 3 policies that sat out must carry forward UNCHANGED,
          # and bc_retry's rating must rise from its round-1 value.
          cli/games season /tmp/s1.json testdata/policy/season_round2.json --output json | tee /tmp/s2.json
          python3 -c "import json; a={r['label']:r for r in json.load(open('/tmp/s1.json'))['standings']}; b={r['label']:r for r in json.load(open('/tmp/s2.json'))['standings']}; d=json.load(open('/tmp/s2.json')); assert d['players']==5,d; assert b['diffusion_pusht']['rating']==a['diffusion_pusht']['rating'],'sitting-out player must carry forward unchanged'; assert b['bc_retry']['rating']>a['bc_retry']['rating'],'round-2 winner must gain rating'; assert b['reckless_policy']['rating']<a['reckless_policy']['rating'],'round-2 loser must lose rating'; assert b['bc_retry']['played']==a['bc_retry']['played']+1; print('season round2 ok: carry-forward + rating movement')"
          echo "SEASON GREEN"

      - name: ACLI surface (introspect is valid JSON; launcher emits clean verdict)
        run: |
          set -euo pipefail
          # introspect must be valid JSON and list verify/export
          python3 -c "import json,sys; d=json.load(sys.stdin); names=[s['name'] for s in d['subcommands']]; assert names==['verify','export','leaderboard','season'], names; print('introspect ok:', names)" < <(cli/games introspect --output json)
          # the launcher strips lex run's trailing exit-code line → stdout is one JSON object (what acli-mcp parses)
          v="$(cli/games verify bazaar testdata/bazaar-sample.jsonl --output json)"
          echo "$v" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['verified'] is True; print('launcher verdict ok')"
          [ "$(printf '%s\n' "$v" | wc -l)" -eq 1 ] || { echo "FAIL: launcher stdout must be a single JSON line"; exit 1; }
          cli/games skill | head -1 | grep -q '^---$' || { echo "FAIL: skill must emit SKILL.md frontmatter"; exit 1; }
          echo "ACLI GREEN"
